name: Install Dependencies
description: Sets the correct Node and Bun versions and installs dependencies.

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v6.3.0
      with:
        node-version-file: .nvmrc

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2.1.3

    - name: Install Dependencies
      shell: bash
      run: bun ci
